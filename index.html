<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 星際數學探險 - 國小四下互動闖關</title>
  <script src="questions-data.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans CJK TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1829 100%);
      min-height: 100vh;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* 星場背景 */
    canvas#stars-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* 頁面容器 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* ===== 首頁 ===== */
    .home-page {
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .home-title {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #00f5ff, #00aaff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .home-subtitle {
      font-size: 1.3rem;
      margin-bottom: 60px;
      color: #b8c5d6;
      font-weight: 300;
    }

    .mode-selector {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .mode-btn {
      padding: 30px 40px;
      font-size: 1.2rem;
      font-weight: bold;
      border: 3px solid;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      min-width: 280px;
      background: rgba(10, 14, 39, 0.6);
      backdrop-filter: blur(10px);
    }

    .mode-btn.game {
      border-color: #00f5ff;
      color: #00f5ff;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
    }

    .mode-btn.game:hover {
      background: rgba(0, 245, 255, 0.1);
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
      transform: translateY(-5px);
    }

    .mode-btn.card {
      border-color: #ff00aa;
      color: #ff00aa;
      box-shadow: 0 0 20px rgba(255, 0, 170, 0.3);
    }

    .mode-btn.card:hover {
      background: rgba(255, 0, 170, 0.1);
      box-shadow: 0 0 40px rgba(255, 0, 170, 0.6);
      transform: translateY(-5px);
    }

    /* ===== 卡牌模式頁面 ===== */
    .card-mode-page {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card-mode-page.active {
      display: block;
    }

    .card-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .card-header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #00f5ff;
    }

    .progress-bar {
      width: 100%;
      max-width: 400px;
      height: 8px;
      background: rgba(100, 150, 200, 0.2);
      border-radius: 10px;
      margin: 20px auto;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f5ff, #ff00aa);
      border-radius: 10px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      text-align: center;
      font-size: 1.1rem;
      color: #b8c5d6;
      margin-top: 10px;
    }

    .card-container {
      max-width: 600px;
      margin: 60px auto;
      perspective: 1000px;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1.2;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(255, 0, 170, 0.1));
      border: 3px solid #00f5ff;
      border-radius: 20px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: grab;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      user-select: none;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      border-color: #ff00aa;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
    }

    .card.dragging {
      opacity: 0.9;
      cursor: grabbing;
    }

    .card-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card-question {
      font-size: 1.5rem;
      line-height: 1.6;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .card-hint {
      font-size: 0.9rem;
      color: #00f5ff;
      margin-top: 20px;
      font-style: italic;
    }

    .card-back {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card-back.show {
      display: flex;
    }

    .card-answer {
      font-size: 2rem;
      font-weight: bold;
      color: #00ff88;
      margin-bottom: 30px;
      text-decoration: underline wavy #ff00aa;
    }

    .card-explanation {
      font-size: 1rem;
      line-height: 1.8;
      color: #d4e4f7;
      max-height: 250px;
      overflow-y: auto;
      padding: 0 10px;
    }

    .card-steps {
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.8;
      color: #d4e4f7;
      margin: 20px 0;
      padding: 15px;
      background: rgba(0, 245, 255, 0.1);
      border-left: 3px solid #00f5ff;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .card-steps div {
      margin-bottom: 10px;
    }

    .swipe-hint {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #00f5ff;
      opacity: 0.7;
      animation: swipe-pulse 2s ease-in-out infinite;
    }

    @keyframes swipe-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ===== 按鈕 ===== */
    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(10, 14, 39, 0.6);
      backdrop-filter: blur(10px);
    }

    .btn-next {
      border-color: #00ff88;
      color: #00ff88;
    }

    .btn-next:hover {
      background: rgba(0, 255, 136, 0.15);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
      transform: translateY(-3px);
    }

    .btn-back {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .btn-back:hover {
      background: rgba(255, 107, 107, 0.15);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }

    .unit-selector {
      margin: 40px 0;
      text-align: center;
    }

    .unit-selector label {
      margin-right: 15px;
      font-size: 1.1rem;
      color: #b8c5d6;
    }

    .unit-selector select {
      padding: 10px 20px;
      font-size: 1rem;
      border: 2px solid #00f5ff;
      border-radius: 8px;
      background: rgba(10, 14, 39, 0.8);
      color: #ffffff;
      cursor: pointer;
    }

    .unit-selector select:focus {
      outline: none;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
    }

    /* ===== 遊戲模式 ===== */
    .game-mode-page {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .game-mode-page.active {
      display: block;
    }

    .game-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin: 60px 0;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .game-card {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(255, 0, 170, 0.1));
      border: 2px solid #00f5ff;
      border-radius: 15px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #ffffff;
    }

    .game-card:hover {
      border-color: #ff00aa;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(255, 0, 170, 0.2));
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
      transform: translateY(-5px);
    }

    .game-card-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .game-card-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #00f5ff;
    }

    .game-card-desc {
      font-size: 0.95rem;
      color: #b8c5d6;
      line-height: 1.6;
    }

    /* ===== 響應式設計 ===== */
    @media (max-width: 768px) {
      .home-title {
        font-size: 2.2rem;
      }

      .card {
        min-height: 400px;
      }

      .card-question {
        font-size: 1.2rem;
      }

      .mode-btn {
        min-width: 200px;
        padding: 20px 30px;
      }

      .game-selector {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 星場背景 -->
  <canvas id="stars-canvas"></canvas>

  <div class="container">
    <!-- ===== 首頁 ===== -->
    <div id="homePage" class="home-page">
      <h1 class="home-title">🌟 星際數學探險</h1>
      <p class="home-subtitle">國小四年級下學期 數學互動學習</p>

      <div class="mode-selector">
        <button class="mode-btn game" onclick="goToGameMode()">
          🎮 遊戲化關卡<br>
          <span style="font-size: 0.7em; opacity: 0.8;">4個互動遊戲闖關</span>
        </button>
        <button class="mode-btn card" onclick="goToCardMode()">
          🎴 卡牌自學方案<br>
          <span style="font-size: 0.7em; opacity: 0.8;">隨機題目引導學習</span>
        </button>
      </div>
    </div>

    <!-- ===== 卡牌模式 ===== -->
    <div id="cardModePage" class="card-mode-page">
      <div class="card-header">
        <h1>🎴 卡牌自學模式</h1>
        <p style="color: #b8c5d6; margin-top: 10px;">左滑卡牌查看答案</p>

        <div class="unit-selector">
          <label for="unitSelect">選擇單元：</label>
          <select id="unitSelect" onchange="changeUnit()">
            <option value="">📚 隨機所有題目</option>
          </select>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text">
          <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span>
        </div>
      </div>

      <div class="card-container">
        <div class="card" id="mainCard">
          <div class="card-content">
            <div class="card-question" id="questionText">載入中...</div>
            <div class="card-hint" id="questionTip"></div>
            <div class="swipe-hint">← 左滑查看答案</div>
          </div>
          <div class="card-back">
            <div class="card-answer" id="answerText"></div>
            <div id="answerContent"></div>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-back" onclick="resetCard()">重新看題目</button>
        <button class="btn btn-next" onclick="nextQuestion()" id="nextBtn" disabled>下一題 →</button>
        <button class="btn btn-back" onclick="backToHome()">返回首頁</button>
      </div>
    </div>

    <!-- ===== 遊戲模式 ===== -->
    <div id="gameModePage" class="game-mode-page">
      <div class="card-header">
        <h1>🎮 遊戲化闖關模式</h1>
        <p style="color: #b8c5d6; margin-top: 10px;">選擇你喜歡的遊戲方式</p>
      </div>

      <div class="game-selector">
        <div class="game-card" onclick="startGame('quiz')">
          <div class="game-card-icon">📝</div>
          <div class="game-card-title">選擇題闖關</div>
          <div class="game-card-desc">
            快速反應的選擇題遊戲<br>
            4個選項中選出正確答案
          </div>
        </div>

        <div class="game-card" onclick="startGame('fillblank')">
          <div class="game-card-icon">✏️</div>
          <div class="game-card-title">填空大挑戰</div>
          <div class="game-card-desc">
            根據步驟填入正確答案<br>
            考驗你的理解能力
          </div>
        </div>

        <div class="game-card" onclick="startGame('matching')">
          <div class="game-card-icon">🔗</div>
          <div class="game-card-title">配對遊戲</div>
          <div class="game-card-desc">
            找出題目與答案的配對<br>
            訓練邏輯思維
          </div>
        </div>

        <div class="game-card" onclick="startGame('speedrun')">
          <div class="game-card-icon">⚡</div>
          <div class="game-card-title">計時闖關</div>
          <div class="game-card-desc">
            60秒內通過盡可能多的題目<br>
            挑戰你的速度和準確度
          </div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-back" onclick="backToHome()">返回首頁</button>
      </div>
    </div>

    <!-- ===== 遊戲執行頁面 ===== -->
    <div id="gamePlayPage" class="card-mode-page">
      <div class="card-header">
        <h1 id="gameTitleHeader">🎮 遊戲</h1>
        <p style="color: #b8c5d6; margin-top: 10px;" id="gameSubtitle"></p>

        <div class="unit-selector">
          <label for="gameUnitSelect">選擇單元：</label>
          <select id="gameUnitSelect" onchange="changeGameUnit()">
            <option value="">📚 隨機所有題目</option>
          </select>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="gameProgressFill"></div>
        </div>
        <div class="progress-text">
          <span id="gameScore" style="color: #00ff88;">0</span> / <span id="gameTotal">10</span>
        </div>
      </div>

      <div id="gameContent"></div>

      <div class="button-group">
        <button class="btn btn-back" onclick="exitGame()">退出遊戲</button>
      </div>
    </div>

    <!-- ===== 教學頁面 (新增) ===== -->
    <div id="tutorialPage" style="display:none;">
      <div id="tutorialContent"></div>
    </div>
  </div>

  <script>
    // ===== URL 參數讀取 & 頁面標題動態更新 =====
    function getGradeParameter() {
      const params = new URLSearchParams(window.location.search);
      const grade = params.get('grade'); // 會得到 '4-2', '5-1' 等
      return grade || '4-2'; // 默認 4-2
    }

    const gradeLabels = {
      '4-2': '四年級下學期',
      '5-1': '五年級上學期',
      '5-2': '五年級下學期',
      '6-1': '六年級上學期',
      '6-2': '六年級下學期'
    };

    const currentGrade = getGradeParameter();
    const gradeLabel = gradeLabels[currentGrade] || gradeLabels['4-2'];

    // 更新頁面標題
    document.title = `🌟 星際數學探險 - ${gradeLabel}互動闖關`;

    // 更新首頁副標題
    document.addEventListener('DOMContentLoaded', () => {
      const subtitle = document.querySelector('.home-subtitle');
      if (subtitle) {
        subtitle.textContent = `國小${gradeLabel} 數學互動學習`;
      }
    });

    // ===== 星場動畫 =====
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 5000);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.3,
          alpha: Math.random(),
          speed: Math.random() * 0.003 + 0.001,
          phase: Math.random() * Math.PI * 2,
          color: ['#ffffff', '#00f5ff', '#b400ff', '#ff00aa'][Math.floor(Math.random() * 4)]
        });
      }
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const a = (Math.sin(t * s.speed + s.phase) + 1) / 2 * 0.8 + 0.15;
        ctx.fillStyle = s.color;
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    let starAnimationRaf;
    function animateStars(t) {
      drawStars(t);
      starAnimationRaf = requestAnimationFrame(animateStars);
    }

    resizeCanvas();
    createStars();
    starAnimationRaf = requestAnimationFrame(animateStars);
    window.addEventListener('resize', () => {
      resizeCanvas();
      createStars();
    });

    // ===== 題庫數據 =====
    const questionDatabase = {
      u1_operations: { title: "四則混合運算", questions: [] },
      u2_rounding: { title: "概數", questions: [] },
      u3_quadrilateral: { title: "四邊形性質", questions: [] },
      u4_volume: { title: "體積", questions: [] },
      u5_fractions: { title: "分數的加減與轉換", questions: [] },
      u6_decimals: { title: "小數的加減", questions: [] },
      u7_area: { title: "周長與面積", questions: [] },
      u8_time: { title: "時間的計算", questions: [] },
      u9_operations_adv: { title: "終極密碼戰 (四則運算進階)", questions: [] },
      u10_geometry_adv: { title: "空間大師 (幾何進階)", questions: [] },
      u11_fractions_decimals_adv: { title: "魔法市集 (分數與小數進階)", questions: [] },
      u12_time_large_num_adv: { title: "星際航線 (時間與大數綜合)", questions: [] },
      u13_length: { title: "長度換算 (公里與公尺)", questions: [] },
      u14_weight: { title: "重量換算 (公斤與公克)", questions: [] },
      u15_capacity: { title: "容量換算 (公升與毫升)", questions: [] },
      u16_charts: { title: "統計與圖表判讀", questions: [] },
      u17_mixed_fraction_decimal: { title: "小數與分數的羈絆", questions: [] },
      u18_area_perimeter_adv: { title: "複合圖形大挑戰 (面積與周長)", questions: [] },
      u19_daily_math: { title: "生活素養：生活中的數學", questions: [] },
      u20_brain_teasers: { title: "終極大魔王：邏輯推理解謎", questions: [] }
    };

    // ===== 頁面導航 =====
    function goToGameMode() {
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('gameModePage').classList.add('active');
      initGameMode();
    }

    function goToCardMode() {
      // 【KEY FIX】: Ensure math database is loaded before card mode
      Promise.resolve(mathDatabaseLoadPromise || initMathDatabase()).then(() => {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('cardModePage').classList.add('active');
        loadQuestions();
        loadFirstQuestion();
        populateUnitSelector();
        setupSwipeListenerOnce();
      });
    }

    function backToHome() {
      document.getElementById('homePage').style.display = 'flex';
      document.getElementById('cardModePage').classList.remove('active');
      currentQuestions = [];
      currentIndex = 0;
    }

    // ===== 卡牌相關函數 =====
    let currentQuestions = [];
    let currentIndex = 0;
    let selectedUnit = '';
    let isFlipped = false;
    let touchStartX = 0;
    let swipeListenerSetup = false;

    function loadQuestions() {
      // 從題庫數據加載所有題目
      if (typeof MATH_QUESTIONS !== 'undefined') {
        for (const [unitId, unitData] of Object.entries(MATH_QUESTIONS)) {
          if (questionDatabase[unitId]) {
            questionDatabase[unitId].questions = unitData.questions || [];
          }
        }
      } else {
        // Fallback：如果未載入外部數據，使用示例題目
        addQuestionsToDatabase([
          {
            id: "q1_1", type: "step_by_step",
            content: "計算 120 + 80 ÷ 4",
            options: ["50", "140", "150", "200"], answer: "140",
            steps: ["第一步：先算除法。 80 ÷ 4 = 20", "第二步：再算加法。 120 + 20 = 140"],
            tip: "沒有括號時，記得先乘除後加減！"
          },
          {
            id: "q1_2", type: "step_by_step",
            content: "計算 (150 - 30) × 3",
            options: ["60", "450", "360", "90"], answer: "360",
            steps: ["第一步：先算括號內。 150 - 30 = 120", "第二步：再算括號外。 120 × 3 = 360"],

    function addQuestionsToDatabase(questions) {
      const unitMap = {
        'q1': 'u1_operations',
        'q2': 'u2_rounding',
        'q3': 'u3_quadrilateral',
        'q4': 'u4_volume',
        'q5': 'u5_fractions',
        'q6': 'u6_decimals',
        'q7': 'u7_area',
        'q8': 'u8_time',
        'q9': 'u9_operations_adv',
        'q10': 'u10_geometry_adv',
        'q11': 'u11_fractions_decimals_adv',
        'q12': 'u12_time_large_num_adv',
        'q13': 'u13_length',
        'q14': 'u14_weight',
        'q15': 'u15_capacity',
        'q16': 'u16_charts',
        'q17': 'u17_mixed_fraction_decimal',
        'q18': 'u18_area_perimeter_adv',
        'q19': 'u19_daily_math',
        'q20': 'u20_brain_teasers'
      };

      questions.forEach(q => {
        // 取出題號前綴，如 q1_1 -> q1 或 q10_1 -> q10
        const prefix = q.id.split('_')[0];
        const actualUnitId = unitMap[prefix];

        if (actualUnitId && questionDatabase[actualUnitId]) {
          questionDatabase[actualUnitId].questions.push(q);
        }
      });
    }

    function loadFirstQuestion() {
      currentIndex = 0;
      selectedUnit = '';
      getAllQuestions();
    }

    function getAllQuestions() {
      currentQuestions = [];
      for (const unit in questionDatabase) {
        currentQuestions = currentQuestions.concat(questionDatabase[unit].questions);
      }
      // 隨機打亂順序
      currentQuestions = currentQuestions.sort(() => Math.random() - 0.5);
      if (currentQuestions.length === 0) {
        currentQuestions = [{
          id: "demo",
          content: "歡迎使用卡牌自學模式！\n左滑卡牌查看完整的題目與答案。\n系統將隨機挑選題目給你練習。",
          answer: "準備開始！",
          explanation: "數據正在載入中..."
        }];
      }
      displayQuestion();
    }

    function changeUnit() {
      const select = document.getElementById('unitSelect');
      selectedUnit = select.value;
      currentIndex = 0;

      if (selectedUnit === '') {
        getAllQuestions();
      } else {
        currentQuestions = [...(questionDatabase[selectedUnit]?.questions || [])];
        currentQuestions = currentQuestions.sort(() => Math.random() - 0.5);
        displayQuestion();
      }
    }

    function populateUnitSelector() {
      const select = document.getElementById('unitSelect');
      for (const [key, value] of Object.entries(questionDatabase)) {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = value.title;
        select.appendChild(option);
      }
    }

    function displayQuestion() {
      if (currentQuestions.length === 0) {
        document.getElementById('questionText').textContent = '沒有題目';
        return;
      }

      const q = currentQuestions[currentIndex];
      isFlipped = false;

      document.getElementById('questionText').textContent = q.content;
      document.getElementById('questionTip').textContent = q.tip || '';
      document.getElementById('totalQuestions').textContent = Math.min(currentQuestions.length, 10);
      document.getElementById('currentQuestion').textContent = currentIndex + 1;

      // 更新進度條
      const progress = ((currentIndex + 1) / Math.min(currentQuestions.length, 10)) * 100;
      document.getElementById('progressFill').style.width = progress + '%';

      // 顯示答案區域
      let answerHTML = '';
      if (q.steps) {
        answerHTML += '<div class="card-steps">';
        q.steps.forEach((step, idx) => {
          answerHTML += `<div>${step}</div>`;
        });
        answerHTML += '</div>';
      }
      if (q.explanation) {
        answerHTML += `<div class="card-explanation">${q.explanation}</div>`;
      }
      document.getElementById('answerContent').innerHTML = answerHTML;
      document.getElementById('answerText').textContent = q.answer || '✓ 正確';

      // 重置卡牌
      resetCard();
      document.getElementById('nextBtn').disabled = true;
    }

    function resetCard() {
      isFlipped = false;
      const cardContent = document.querySelector('.card-content');
      const cardBack = document.querySelector('.card-back');
      cardContent.style.display = 'flex';
      cardBack.classList.remove('show');
      document.getElementById('nextBtn').disabled = true;
    }

    function setupSwipeListenerOnce() {
      if (swipeListenerSetup) return;
      swipeListenerSetup = true;
      setupSwipeListener();
    }

    function setupSwipeListener() {
      const card = document.getElementById('mainCard');
      card.style.cursor = 'grab';

      card.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        card.classList.add('dragging');
      });

      card.addEventListener('touchmove', (e) => {
        const currentX = e.touches[0].clientX;
        const diff = touchStartX - currentX;

        // 左滑超過 50px 就翻轉
        if (diff > 50 && !isFlipped) {
          flipCard();
        }
      });

      card.addEventListener('touchend', () => {
        card.classList.remove('dragging');
      });

      // 桌面滑鼠支持
      let isMouseDown = false;
      card.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        touchStartX = e.clientX;
        card.style.cursor = 'grabbing';
      });

      card.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        const currentX = e.clientX;
        const diff = touchStartX - currentX;
        if (diff > 50 && !isFlipped) {
          flipCard();
          isMouseDown = false;
        }
      });

      card.addEventListener('mouseup', () => {
        isMouseDown = false;
        card.style.cursor = 'grab';
      });
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;

      const cardContent = document.querySelector('.card-content');
      const cardBack = document.querySelector('.card-back');

      cardContent.style.display = 'none';
      cardBack.classList.add('show');
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= Math.min(currentQuestions.length, 10)) {
        currentIndex = 0;
        currentQuestions = currentQuestions.sort(() => Math.random() - 0.5);
        alert('🎉 完成一輪練習！\n系統已重新打亂題目，繼續加油！');
      }
      displayQuestion();
    }

    // ===== 遊戲模式相關 =====

    let gameQuestions = [];
    let gameScore = 0;
    let gameIndex = 0;
    let gameUnit = '';

    const gameModes = {

      matching: { title: '🔗 配對遊戲', subtitle: '找出題目與答案的對應' },

    function startGame(mode) {

        gameScore = 0;
        gameIndex = 0;
        gameUnit = '';

    function populateGameUnitSelector() {
      const select = document.getElementById('gameUnitSelect');
      select.innerHTML = '<option value="">📚 隨機所有題目</option>';
      for (const [key, value] of Object.entries(questionDatabase)) {

        select.appendChild(option);
      }

    function changeGameUnit() {
      const select = document.getElementById('gameUnitSelect');

        // 隨機題目，不顯示教學頁面

        gameScore = 0;
        gameIndex = 0;
        loadGameQuestions();
      } else {
        // 顯示教學頁面
        displayTutorialPage(selectedUnitId);
      }

    function loadGameQuestions() {
      if (gameUnit === '') {
        gameQuestions = [];
        for (const unit in questionDatabase) {
          gameQuestions = gameQuestions.concat(questionDatabase[unit].questions);
        }
      } else {
        gameQuestions = [...(questionDatabase[gameUnit]?.questions || [])];
      }
      gameQuestions = gameQuestions.sort(() => Math.random() - 0.5);
      gameIndex = 0;
      gameScore = 0;
      displayGameContent();
    }

    function displayGameContent() {
      if (gameQuestions.length === 0) {
        document.getElementById('gameContent').innerHTML = '<p>沒有題目</p>';
        return;
      }

      const q = gameQuestions[gameIndex];
      const total = Math.min(gameQuestions.length, 10);
      document.getElementById('gameTotal').textContent = total;
      document.getElementById('gameScore').textContent = gameIndex + 1;
      document.getElementById('gameProgressFill').style.width = ((gameIndex + 1) / total * 100) + '%';

      switch (currentGameMode) {
        case 'quiz':
          html = renderQuizMode(q);
          break;
        case 'fillblank':
          html = renderFillBlankMode(q);
          break;
        case 'matching':
          html = renderMatchingMode(q);
          break;
        case 'speedrun':
          html = renderSpeedRunMode(q);
          break;
      }
      document.getElementById('gameContent').innerHTML = html;

    function checkAnswer(correct, selected) {
      const q = gameQuestions[gameIndex];

      if (selected === correct) {
        gameScore++;
        const feedback = document.createElement('div');
        feedback.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 255, 136, 0.9); color: #000; padding: 40px 60px; border-radius: 20px; font-size: 2rem; font-weight: bold; z-index: 1000; animation: fadeOut 1.5s ease-in-out forwards;';

        document.body.appendChild(feedback);

        setTimeout(() => {
          gameIndex++;
          if (gameIndex >= Math.min(gameQuestions.length, 10)) {
            finishGame();
          } else {
            displayGameContent();
          }
        }, 1500);
      } else {

    function closeExplanationAndNext() {
      // 移除遮罩
      const overlay = document.querySelector('div[style*="background: rgba(0, 0, 0, 0.7)"]');
      if (overlay) {
        overlay.style.animation = 'fadeOut 0.3s ease-in-out forwards';
        setTimeout(() => overlay.remove(), 300);
      }

      // 移到下一題
      setTimeout(() => {
        gameIndex++;
        if (gameIndex >= Math.min(gameQuestions.length, 10)) {
          finishGame();
        } else {
          displayGameContent();
        }
      }, 300);
    }

    function finishGame() {
      const total = Math.min(gameQuestions.length, 10);
      const percentage = Math.round((gameScore / total) * 100);
      let emoji = '🌟';
      let message = '優秀！';
      if (percentage < 50) { emoji = '💪'; message = '繼續加油！'; }
      else if (percentage < 70) { emoji = '👍'; message = '不錯！'; }
      else if (percentage < 90) { emoji = '🎉'; message = '很棒！'; }

      const result = `${emoji} 遊戲結束！\n\n${message}\n正確率: ${percentage}%\n${gameScore} / ${total}`;
      alert(result);
      goToGameMode();
    }

    function exitGame() {
      document.getElementById('gamePlayPage').classList.remove('active');
      document.getElementById('gameModePage').classList.add('active');
    }

    // ===== 載入 math_db.json with proper state management =====
    let MATH_DATABASE = {};
    let mathDatabaseLoaded = false;
    let mathDatabaseLoadPromise = null;

    // Load math_db.json and merge into questionDatabase
    function initMathDatabase() {
      if (mathDatabaseLoadPromise) return mathDatabaseLoadPromise;

      mathDatabaseLoadPromise = fetch('./math_db.json')
        .then(res => res.json())
        .then(data => {
          MATH_DATABASE = {};
          const dbKeys = Object.keys(questionDatabase);

          data.units.forEach((unit, index) => {
            MATH_DATABASE[unit.unit_id] = unit;

            // 【KEY FIX】: Transfer questions to questionDatabase for game system
            // Try exact ID match first, then fallback to index-based mapping
            let targetKey = null;
            if (questionDatabase[unit.unit_id]) {
              targetKey = unit.unit_id;
            } else if (index < dbKeys.length) {
              // Fallback: use index-based mapping for mismatched IDs
              targetKey = dbKeys[index];
            }

            if (targetKey) {
              questionDatabase[targetKey].questions = unit.questions || [];
              console.log(`Transferred ${unit.questions?.length || 0} questions to ${targetKey} (from ${unit.unit_id})`);
            }
          });

          mathDatabaseLoaded = true;
          console.log('Math DB loaded:', Object.keys(MATH_DATABASE).length, 'units');
          console.log('Questions transferred to questionDatabase');
          return MATH_DATABASE;
        })
        .catch(err => {
          console.warn('math_db.json not found, using fallback data:', err);
          mathDatabaseLoaded = true;
          return {};
        });

      return mathDatabaseLoadPromise;
    }

    // Start loading immediately
    initMathDatabase();

    // ===== 教學頁面函數 with async loading guard =====
    function displayTutorialPage(unitId) {
      // 【KEY FIX】: Wait for math database to load before accessing
      Promise.resolve(mathDatabaseLoadPromise || initMathDatabase()).then(() => {
        const unitData = MATH_DATABASE[unitId];
        if (!unitData || !unitData.tutorial) {
          console.warn('No tutorial found for', unitId, '- skipping to game');
          startGameFromUnit(unitId);
          return;
        }

        selectedUnit = unitId;

        // 隱藏其他頁面
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('gameModePage').classList.remove('active');
        document.getElementById('gamePlayPage').classList.remove('active');
        document.getElementById('cardModePage').classList.remove('active');
        document.getElementById('tutorialPage').style.display = 'block';

        renderTutorialContent(unitData);
      });
    }

    function renderTutorialContent(unitData) {
      const tutorial = unitData.tutorial;
      const tutorialContent = document.getElementById('tutorialContent');

      tutorialContent.innerHTML = `
        <div class="tutorial-wrapper">
          <div class="container">
            <div class="tutorial-header">
              <h1 class="tutorial-title">${tutorial.title || '教學'}</h1>
              <p class="tutorial-intro">${tutorial.intro || ''}</p>
            </div>

            <div class="sections-container">
              ${(tutorial.sections || []).map((section, idx) => `
                <div class="section-card">
                  <h2 class="section-subtitle">${section.subtitle || ''}</h2>
                  <p class="section-content">${section.content || ''}</p>
                  <div class="image-placeholder">
                    <div class="image-icon">🖼️</div>
                    <p class="image-prompt">${section.image_prompt || '圖片將顯示在此'}</p>
                  </div>
                </div>
              `).join('')}
            </div>

            <div style="text-align: center; padding: 40px 0;">
              <button class="start-quiz-button" onclick="startGameFromUnit('${unitData.unit_id}')">
                🎓 我學會了，開始測驗！
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function startGameFromTutorial() {
      if (!selectedUnit) return;
      startGameFromUnit(selectedUnit);
    }

    function startGameFromUnit(unitId) {
      // 【KEY FIX】: Ensure math database is loaded before initializing game
      Promise.resolve(mathDatabaseLoadPromise || initMathDatabase()).then(() => {
        selectedUnit = unitId;
        document.getElementById('tutorialPage').style.display = 'none';
        document.getElementById('gamePlayPage').classList.add('active');

        gameScore = 0;
        gameIndex = 0;
        gameUnit = unitId;

        const unitData = MATH_DATABASE[unitId];
        if (unitData) {
          document.getElementById('gameTitleHeader').textContent = `🎮 ${unitData.unit_title}`;
          document.getElementById('gameSubtitle').textContent = '完成所有題目來獲得勝利！';
        }

        // Only call loadQuestions if needed for other purposes
        // Questions are now already in questionDatabase from initMathDatabase
        loadGameQuestions();
        displayGameContent();
      });
    }

    // ===== 教學頁面 CSS 樣式 =====
    // 添加淡出動畫
    const style = document.createElement('style');
    style.textContent = `

      }

      }

        margin-bottom: 20px;
        text-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
      }

        font-size: 1.1rem;

        max-width: 800px;
        margin: 0 auto;
      }

      .sections-container {
        max-width: 900px;
        margin: 0 auto 40px;
        display: flex;
        flex-direction: column;

      }

      .section-card {
        background: linear-gradient(135deg, rgba(0, 45, 90, 0.4), rgba(10, 14, 39, 0.6));

        box-shadow: 0 0 30px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05);
        transition: all 0.3s ease;
      }

      .section-card:hover {
        border-color: rgba(0, 245, 255, 0.7);
        box-shadow: 0 0 40px rgba(0, 245, 255, 0.4), inset 0 0 20px rgba(0, 245, 255, 0.1);
        transform: translateY(-2px);
      }

      .section-subtitle {
        font-size: 1.5rem;
        font-weight: bold;
        color: #00ff88;
        margin-bottom: 15px;

      }

      .section-content {
        font-size: 1rem;

        line-height: 1.8;
        margin-bottom: 20px;
      }

      .image-placeholder {
        background: linear-gradient(to bottom, #2a3a5a, #1a2a4a);

      }

      .start-quiz-button {

      .start-quiz-button:hover {

    document.head.appendChild(style);

    // 頁面卸載時清理 RAF
    window.addEventListener('beforeunload', () => {
      if (starAnimationRaf) {
        cancelAnimationFrame(starAnimationRaf);
      }
    });
  </script>
