<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股板塊輪動 · Sector Rotation</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>台股板塊輪動 <span class="subtitle-en">· Sector Rotation</span></h1>
            </div>
            <div class="header-controls">
                <button id="refreshBtn" class="btn-refresh">刷新</button>
                <div class="search-box">
                    <input type="text" placeholder="搜尋板塊..." id="searchInput">
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-label">輪動</div>
                    <div class="sidebar-value rotating" id="stat-rotation">0</div>
                    <div class="sidebar-desc">資金加速流入</div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-label">主力</div>
                    <div class="sidebar-value major" id="stat-major">0</div>
                    <div class="sidebar-desc">資金流入但放緩</div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-label">觀望</div>
                    <div class="sidebar-value watching" id="stat-watching">0</div>
                    <div class="sidebar-desc">資金沉寂</div>
                </div>

                <hr class="sidebar-divider">

                <div class="sidebar-list" id="sidebarList">
                    <!-- 動態生成的列表 -->
                </div>
            </aside>

            <!-- Center Chart Area -->
            <main class="chart-area">
                <div id="bubble-chart" class="bubble-chart"></div>
            </main>

            <!-- Detail Panel (Right) -->
            <aside id="detail-panel" class="detail-panel hidden">
                <div class="detail-content">
                    <h2 id="detail-sector"></h2>

                    <div class="detail-section">
                        <div class="detail-item">
                            <span class="detail-label">基本法人淨買賣超</span>
                            <span class="detail-value" id="detail-basic"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">近5日法人淨買賣超</span>
                            <span class="detail-value" id="detail-5d"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">近20日累計</span>
                            <span class="detail-value" id="detail-20d"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">資金加速度</span>
                            <span class="detail-value" id="detail-speed"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">近5日漲跌</span>
                            <span class="detail-value" id="detail-change"></span>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="detail-label">軸動</div>
                        <div class="detail-stocks" id="detail-stocks"></div>
                    </div>

                    <div class="detail-section">
                        <div class="detail-label">代票數</div>
                        <div class="detail-codes" id="detail-codes"></div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>免責聲明：本網站資訊僅供參考，不構成任何投資建議。</p>
            <p>數據來源：台灣證券交易所｜更新頻率：每日收盤後</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/visualization.js"></script>
</body>
</html>
