<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股板塊輪動 · Sector Rotation</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Top Info Bar -->
        <div class="info-bar">
            <span>資料日期：2026-06-08</span>
            <span>盤後更新：2026/06/08 23:19（台灣時間）</span>
        </div>

        <div class="main-layout">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <div class="status-card" data-status="主力">
                    <div class="status-label">主力</div>
                    <div class="status-value">14</div>
                    <div class="status-desc">資金加速流入</div>
                </div>

                <div class="status-card" data-status="短期">
                    <div class="status-label">短期</div>
                    <div class="status-value">8</div>
                    <div class="status-desc">資金流入但放緩</div>
                </div>

                <div class="status-card" data-status="觀望">
                    <div class="status-label">觀望</div>
                    <div class="status-value">0</div>
                    <div class="status-desc">資金沉寂</div>
                </div>

                <div class="status-card" data-status="觀察">
                    <div class="status-label">觀察</div>
                    <div class="status-value">56</div>
                    <div class="status-desc">資金流出</div>
                </div>

                <hr>

                <div class="trending-list" id="trending-list">
                    <!-- Dynamically populated -->
                </div>
            </aside>

            <!-- Center Chart -->
            <main class="chart-container">
                <div id="bubble-chart" class="bubble-chart"></div>
            </main>

            <!-- Right Detail Panel -->
            <aside id="detail-panel" class="detail-panel">
                <div class="detail-header">
                    <h2 class="detail-title">板塊名稱</h2>
                    <span class="detail-close">×</span>
                </div>

                <div class="detail-body">
                    <div class="sub-categories" id="sub-categories">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>免責聲明：本網站資訊僅供參考，不構成任何投資建議。</p>
            <p>數據來源：台灣證券交易所｜更新頻率：每日收盤後</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/visualization.js"></script>
</body>
</html>
